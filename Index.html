<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora P2P Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo Gaming con estrellas animadas */
        body {
            background: radial-gradient(circle at center, #064e3b 0%, #020617 100%);
            overflow: hidden;
            height: 100vh;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: transparent url("https://www.transparenttextures.com/patterns/stardust.png");
            animation: moveStars 60s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .glass-gaming {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="stars"></div>

    <div class="glass-gaming p-8 rounded-3xl w-full max-w-md">
        <h1 class="text-3xl font-black text-emerald-400 mb-2 text-center tracking-widest uppercase">P2P Stats</h1>
        <p class="text-emerald-100 text-center mb-8 text-sm opacity-70">Cálculo de conversión en tiempo real</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-emerald-300 uppercase">USD a enviar</label>
                <input type="number" id="usdInput" value="10" step="0.01" class="w-full mt-1 p-3 bg-gray-900 border border-emerald-800 rounded-lg text-emerald-50 outline-none focus:border-emerald-400">
            </div>

            <div>
                <label class="block text-xs font-bold text-emerald-300 uppercase">Tasa de cambio (USD a NIO)</label>
                <input type="number" id="tasaCambio" value="36.2" step="0.1" class="w-full mt-1 p-3 bg-gray-900 border border-emerald-800 rounded-lg text-emerald-50 outline-none focus:border-emerald-400">
            </div>

            <div>
                <label class="block text-xs font-bold text-emerald-300 uppercase">Precio USDT (NIO)</label>
                <input type="number" id="precioUsdt" value="40" step="0.1" class="w-full mt-1 p-3 bg-gray-900 border border-emerald-800 rounded-lg text-emerald-50 outline-none focus:border-emerald-400">
            </div>

            <div>
                <label class="block text-xs font-bold text-emerald-300 uppercase">Comisión Binance (USDT)</label>
                <input type="number" id="comisionUsdt" value="0.05" step="0.01" class="w-full mt-1 p-3 bg-gray-900 border border-emerald-800 rounded-lg text-emerald-50 outline-none focus:border-emerald-400">
            </div>

            <button onclick="calcular()" class="w-full bg-emerald-600 text-white py-4 rounded-lg font-black hover:bg-emerald-500 transition-all uppercase tracking-tighter shadow-[0_0_15px_rgba(5,150,105,0.5)]">
                Calcular
            </button>
        </div>

        <div id="resultado" class="mt-8 p-5 bg-black/40 rounded-2xl border border-emerald-900/50 hidden animate-pulse">
            <div class="flex justify-between items-center mb-2">
                <span class="text-emerald-200/60">Córdobas:</span>
                <span id="totalCordobas" class="font-bold text-emerald-100"></span>
            </div>
            <div class="pt-4 border-t border-emerald-900 flex justify-between items-center">
                <span class="text-emerald-400 font-bold">USDT FINALES:</span>
                <span id="usdtNeto" class="text-2xl font-black text-white"></span>
            </div>
        </div>
    </div>

    <script>
        function calcular() {
            const usd = parseFloat(document.getElementById('usdInput').value);
            const tasa = parseFloat(document.getElementById('tasaCambio').value);
            const precioUsdt = parseFloat(document.getElementById('precioUsdt').value);
            const comision = parseFloat(document.getElementById('comisionUsdt').value);

            const totalCordobas = usd * tasa;
            const usdtBruto = totalCordobas / precioUsdt;
            const usdtNeto = usdtBruto - comision;

            document.getElementById('totalCordobas').innerText = 'C$ ' + totalCordobas.toFixed(2);
            document.getElementById('usdtNeto').innerText = (usdtNeto > 0 ? usdtNeto.toFixed(4) : 0) + ' USDT';
            document.getElementById('resultado').classList.remove('hidden');
        }
    </script>
</body>
</html>
